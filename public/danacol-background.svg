<svg width="1800" height="1200" viewBox="0 0 1800 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1800" height="1200" fill="transparent"/>

  <defs>
    <radialGradient id="heroGlow" cx="0.7" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#c8913a" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#c8913a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0c0a07" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bottleGlow" cx="0.5" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#e8c875" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0c0a07" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bottleBody" x1="1200" y1="200" x2="1200" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f2f0ed" stop-opacity="0.12"/>
      <stop offset="0.5" stop-color="#c8913a" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#f2f0ed" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="labelGrad" x1="1120" y1="420" x2="1280" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c8913a" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#e8c875" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Ambient glow -->
  <rect width="1800" height="1200" fill="url(#heroGlow)"/>
  <ellipse cx="1200" cy="500" rx="500" ry="400" fill="url(#bottleGlow)"/>

  <!-- Danacol bottle silhouette -->
  <g opacity="0.6" transform="translate(1100, 140)">
    <!-- Bottle cap -->
    <rect x="60" y="0" width="80" height="35" rx="6" fill="#f2f0ed" fill-opacity="0.08" stroke="#c8913a" stroke-opacity="0.15" stroke-width="1.5"/>
    <rect x="50" y="30" width="100" height="15" rx="4" fill="#c8913a" fill-opacity="0.1"/>

    <!-- Bottle neck -->
    <path d="M55 45 L55 100 Q55 115 70 120 L130 120 Q145 115 145 100 L145 45" fill="url(#bottleBody)" stroke="#f2f0ed" stroke-opacity="0.08" stroke-width="1"/>

    <!-- Bottle body -->
    <path d="M35 120 Q35 135 50 140 L50 680 Q50 710 80 720 L120 720 Q150 710 150 680 L150 140 Q165 135 165 120" fill="url(#bottleBody)" stroke="#f2f0ed" stroke-opacity="0.1" stroke-width="1.5"/>

    <!-- Label area -->
    <rect x="48" y="280" width="104" height="200" rx="8" fill="url(#labelGrad)" stroke="#c8913a" stroke-opacity="0.2" stroke-width="1"/>

    <!-- Danacol text on label -->
    <text x="100" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#c8913a" fill-opacity="0.6" letter-spacing="2">DANACOL</text>
    <text x="100" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#e8c875" fill-opacity="0.4" letter-spacing="3">PRE</text>

    <!-- Label decorative line -->
    <line x1="65" y1="405" x2="135" y2="405" stroke="#c8913a" stroke-opacity="0.2" stroke-width="1"/>
    <text x="100" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f2f0ed" fill-opacity="0.2">PLANT STEROLS</text>
    <text x="100" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f2f0ed" fill-opacity="0.15">HIGH PROTEIN</text>
    <text x="100" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f2f0ed" fill-opacity="0.12">NO SUGAR</text>

    <!-- Heart icon on bottle -->
    <path d="M88 310 C88 300 78 295 78 305 C78 318 100 330 100 330 C100 330 122 318 122 305 C122 295 112 300 112 310 C112 318 100 325 100 325 C100 325 88 318 88 310Z" fill="#c8913a" fill-opacity="0.15" stroke="#c8913a" stroke-opacity="0.25" stroke-width="1"/>

    <!-- Bottle reflection highlight -->
    <path d="M70 150 L70 650 Q70 670 80 680" stroke="#f2f0ed" stroke-opacity="0.06" stroke-width="2"/>

    <!-- Bottle bottom shine -->
    <ellipse cx="100" cy="720" rx="50" ry="8" fill="#c8913a" fill-opacity="0.06"/>
  </g>

  <!-- Second smaller bottle behind (depth) -->
  <g opacity="0.2" transform="translate(1350, 250) scale(0.7)">
    <rect x="60" y="0" width="80" height="35" rx="6" fill="#f2f0ed" fill-opacity="0.06"/>
    <path d="M35 120 Q35 135 50 140 L50 680 Q50 710 80 720 L120 720 Q150 710 150 680 L150 140 Q165 135 165 120" fill="#f2f0ed" fill-opacity="0.04" stroke="#f2f0ed" stroke-opacity="0.06" stroke-width="1"/>
    <path d="M55 45 L55 100 Q55 115 70 120 L130 120 Q145 115 145 100 L145 45" fill="#f2f0ed" fill-opacity="0.03"/>
    <rect x="48" y="280" width="104" height="200" rx="8" fill="#c8913a" fill-opacity="0.04"/>
  </g>

  <!-- Floating particles -->
  <g opacity="0.4">
    <circle cx="1050" cy="350" r="3" fill="#c8913a">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="350;340;350" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1380" cy="280" r="2" fill="#e8c875">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="280;268;280" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1420" cy="600" r="4" fill="#c8913a">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="600;585;600" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1150" cy="800" r="2.5" fill="#f2f0ed">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1300" cy="180" r="2" fill="#e8c875">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="1300;1308;1300" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1480" cy="450" r="1.5" fill="#c8913a">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Curved flowing lines (wellness/health) -->
  <g opacity="0.15">
    <path d="M900 900 Q1050 800 1200 850 Q1350 900 1500 820 Q1650 740 1800 780" stroke="#c8913a" stroke-width="1.5" fill="none"/>
    <path d="M900 940 Q1080 850 1220 890 Q1380 940 1520 860 Q1660 780 1800 810" stroke="#e8c875" stroke-width="1" fill="none"/>
    <path d="M900 860 Q1020 780 1180 810 Q1320 840 1480 770 Q1620 700 1800 750" stroke="#c8913a" stroke-width="1" fill="none"/>
  </g>

  <!-- Subtle vignette -->
  <defs>
    <radialGradient id="vig" cx="0.6" cy="0.45" r="0.7">
      <stop offset="0.2" stop-color="#0c0a07" stop-opacity="0"/>
      <stop offset="1" stop-color="#0c0a07" stop-opacity="0.7"/>
    </radialGradient>
  </defs>
  <rect width="1800" height="1200" fill="url(#vig)"/>
</svg>
